<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffca3a">
    <title>Free Draw</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="Free Draw">
          <img src="assets/icon.svg" alt="" width="44" height="44">
          <span>Free Draw</span>
        </div>
        <div class="action-bar" aria-label="Picture actions">
          <button class="icon-button" id="undoButton" type="button" aria-label="Undo" title="Undo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7H4v5"/><path d="M4 12c2.3-4.2 8.7-6.3 13-2.7 2.6 2.2 3 6.1.8 8.7-1.6 1.9-4 2.6-6.2 2.1"/></svg>
          </button>
          <button class="icon-button" id="redoButton" type="button" aria-label="Redo" title="Redo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 7h5v5"/><path d="M20 12c-2.3-4.2-8.7-6.3-13-2.7-2.6 2.2-3 6.1-.8 8.7 1.6 1.9 4 2.6 6.2 2.1"/></svg>
          </button>
          <button class="icon-button" id="saveButton" type="button" aria-label="Save picture" title="Save picture">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"/><path d="m8 10 4 4 4-4"/><path d="M5 19h14"/></svg>
          </button>
          <button class="icon-button danger" id="clearButton" type="button" aria-label="Clear picture" title="Clear picture">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12"/><path d="M9 7V5h6v2"/><path d="M8 10v8"/><path d="M12 10v8"/><path d="M16 10v8"/><path d="M7 7l1 14h8l1-14"/></svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="rail tools-rail" aria-label="Tools">
          <div class="tool-grid" role="toolbar" aria-label="Drawing tools">
            <button class="icon-button tool-button" type="button" data-tool="brush" aria-label="Brush" title="Brush">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20c3.5.2 5.7-.8 6.5-3"/><path d="m9 16 8.8-8.8a2.2 2.2 0 0 0-3.1-3.1L6 12.9"/><path d="m6 13 5 5"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="pencil" aria-label="Pencil" title="Pencil">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="rainbow" aria-label="Rainbow brush" title="Rainbow brush">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 18a7 7 0 0 1 14 0"/><path d="M8 18a4 4 0 0 1 8 0"/><path d="M11 18a1 1 0 0 1 2 0"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="marker" aria-label="Marker" title="Marker">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.8 2.2a2.8 2.8 0 0 1 4 4L19 9h-4l-3-3 5.8-5.8z"/><path d="M12 9 9 12l4 4 3-3V9h-4z"/><path d="m9 12-4 4 4 4 4-4-4-4z"/><path d="M5 16 3 21l5-2"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="neon" aria-label="Neon brush" title="Neon brush">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="eraser" aria-label="Eraser" title="Eraser">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 15 8-8a3 3 0 0 1 4 0l3 3a3 3 0 0 1 0 4l-5 5H7z"/><path d="m9 10 6 6"/><path d="M14 19h6"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="fill" aria-label="Fill" title="Fill">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 13 8-8 7 7-8 8z"/><path d="M12 5V2"/><path d="M18 18c1.8 2.1 1.8 3.6 0 4.5-1.8-.9-1.8-2.4 0-4.5z"/></svg>
            </button>
            <button class="icon-button tool-button" type="button" data-tool="stamp" aria-label="Stamp" title="Stamp">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 9.6 8 4 8.8l4 3.9-.9 5.5 4.9-2.6 4.9 2.6-.9-5.5 4-3.9L14.4 8z"/></svg>
            </button>
            <button class="icon-button toggle-button" id="mirrorButton" type="button" aria-label="Mirror" title="Mirror" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18"/><path d="M8 6 4 10l4 4"/><path d="m16 6 4 4-4 4"/><path d="M4 10h5"/><path d="M15 10h5"/></svg>
            </button>
          </div>

          <div class="size-control">
            <label class="sr-only" for="brushSize">Brush size</label>
            <input id="brushSize" type="range" min="8" max="64" value="22">
            <div class="brush-preview" id="brushPreview" aria-hidden="true"></div>
          </div>

          <div class="swatch-grid" id="colorPalette" aria-label="Colors"></div>
          <label class="custom-color" title="Custom color">
            <span class="sr-only">Custom color</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.16-.61-1.58-.33-.37-.53-.86-.53-1.42 0-1.1.9-2 2-2h1.41c3.31 0 6-2.69 6-6 0-4.97-4.48-9-10-9zM6.5 12c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <input id="customColor" type="color" value="#ff4f6d">
          </label>
        </aside>

        <section class="stage" id="stage" aria-label="Drawing area">
          <div class="canvas-frame" id="canvasFrame">
            <canvas id="drawingCanvas" aria-label="Drawing canvas"></canvas>
            <canvas id="outlineCanvas" aria-hidden="true"></canvas>
          </div>
        </section>

        <aside class="rail pages-rail" aria-label="Coloring pages and stamps">
          <section class="rail-section" aria-labelledby="pagesHeading">
            <h2 id="pagesHeading">Pages</h2>
            <div class="search-box">
              <input type="text" id="pageSearch" placeholder="Search sheets..." aria-label="Search sheets">
            </div>
            <div class="category-strip" id="pageFilters" aria-label="Page categories"></div>
            <div class="page-count" id="pageCount" aria-live="polite"></div>
            <div class="page-list" id="pageList"></div>
          </section>
          <section class="rail-section" aria-labelledby="stampsHeading">
            <h2 id="stampsHeading">Stamps</h2>
            <div class="stamp-grid" id="stampList"></div>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
